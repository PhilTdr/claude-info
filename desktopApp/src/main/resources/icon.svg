<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="512" height="512">
  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="128" y1="8" x2="128" y2="248">
      <stop offset="0%"  stop-color="#E68A6A"/>
      <stop offset="100%" stop-color="#C45A3D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background in Claude's warm copper tone -->
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- Bar chart: three ascending bars representing usage statistics -->
    <rect x="56"  y="148" width="32" height="60"  rx="8" fill="#ffffff"/>
    <rect x="100" y="116" width="32" height="92"  rx="8" fill="#ffffff"/>
    <rect x="144" y="84"  width="32" height="124" rx="8" fill="#ffffff"/>

    <!-- asterisk above the tallest bar -->
    <g transform="translate(200 64)">
      <path d="M 0 -28 C 4 -10 10 -4 28 0 C 10 4 4 10 0 28 C -4 10 -10 4 -28 0 C -10 -4 -4 -10 0 -28 Z"
            fill="#ffffff"/>
    </g>
  </g>
</svg>
